name: Setup K8s Substrate
description: Prepare a Kubernetes substrate (MicroK8s or Canonical K8s) via concierge for service-mesh tests.

inputs:
  substrate:
    description: 'K8s substrate to prepare. One of: "microk8s", "canonical-k8s".'
    required: true
  juju-channel:
    description: Snap channel from which to install Juju.
    required: false
    default: "3.6/stable"
  substrate-channel:
    description: Snap channel for the chosen substrate. Routed to CONCIERGE_MICROK8S_CHANNEL or CONCIERGE_K8S_CHANNEL depending on substrate.
    required: true
  configure-cni-for-istio:
    description: Apply CNI configuration tweaks required by Istio sidecars. No-op on substrates that do not use Cilium.
    required: false
    default: "false"
  automatically-retry-hooks:
    description: Value for the juju model-default `automatically-retry-hooks`.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Maximise GH runner space
      uses: jlumbroso/free-disk-space@v1.3.1

    - name: Remove conflicting docker components
      shell: bash
      run: |
        sudo apt-get remove -y docker-ce docker-ce-cli containerd.io || true
        sudo rm -rf /run/containerd

    - name: Install concierge and prepare substrate
      shell: bash
      env:
        CONCIERGE_JUJU_CHANNEL: ${{ inputs.juju-channel }}
        CONCIERGE_MICROK8S_CHANNEL: ${{ inputs.substrate == 'microk8s' && inputs.substrate-channel || '' }}
        CONCIERGE_K8S_CHANNEL: ${{ inputs.substrate == 'canonical-k8s' && inputs.substrate-channel || '' }}
      run: |
        sudo snap install concierge --classic
        case "${{ inputs.substrate }}" in
          microk8s)
            sudo concierge prepare -p microk8s --extra-snaps=astral-uv,terraform
            ;;
          canonical-k8s)
            sudo concierge prepare -p k8s --extra-snaps=astral-uv,terraform --trace
            ;;
          *)
            echo "Unknown substrate: ${{ inputs.substrate }}" >&2
            exit 1
            ;;
        esac
        sudo snap install kubectl --classic
        juju model-defaults automatically-retry-hooks=${{ inputs.automatically-retry-hooks }}

    - name: Configure Cilium for Istio
      # See https://docs.cilium.io/en/stable/network/servicemesh/istio/
      if: inputs.configure-cni-for-istio == 'true' && inputs.substrate == 'canonical-k8s'
      shell: bash
      run: |
        kubectl -n kube-system patch configmap cilium-config --type merge --patch '{"data":{"bpf-lb-sock-hostns-only":"true"}}'
        kubectl -n kube-system patch configmap cilium-config --type merge --patch '{"data":{"cni-exclusive":"false"}}'
        kubectl -n kube-system rollout restart daemonset cilium
        kubectl -n kube-system rollout status daemonset cilium --timeout=300s
