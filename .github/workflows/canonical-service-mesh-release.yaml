name: "canonical-service-mesh: Release"

on:
  push:
    branches: [main]
    paths:
      - "canonical_service_mesh/**"
      - "release-please-config.json"
      - ".release-please-manifest.json"
      - ".github/workflows/canonical-service-mesh-release.yaml"

permissions:
  contents: write
  pull-requests: write
  id-token: write

defaults:
  run:
    working-directory: canonical_service_mesh

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uvx tox -e lint

      - name: Type check
        run: uvx tox -e static

      - name: Run tests
        run: uvx tox -e unit

  release-please:
    needs: quality
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['canonical_service_mesh--release_created'] }}
    steps:
      - uses: actions/checkout@v4
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Build package
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: canonical_service_mesh/dist/
