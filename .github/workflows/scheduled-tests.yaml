name: Scheduled Tests

on:
  schedule:
    # Run every Sunday at 12:00 UTC
    - cron: "0 12 * * 0"
  workflow_dispatch:
    inputs:
      solution:
        description: "Solution(s) to test"
        type: choice
        default: all
        options:
          - all
          - istio
      substrate:
        description: "Substrate(s) to test on"
        type: choice
        default: all
        options:
          - all
          - microk8s
          - canonical-k8s

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dispatch-inputs:
    name: Resolve dispatch inputs
    runs-on: ubuntu-latest
    outputs:
      solutions: ${{ steps.resolve.outputs.solutions }}
      substrates: ${{ steps.resolve.outputs.substrates }}
    steps:
      - name: Resolve solution and substrate selections
        id: resolve
        env:
          SOLUTION_INPUT: ${{ inputs.solution || 'all' }}
          SUBSTRATE_INPUT: ${{ inputs.substrate || 'all' }}
        run: |
          case "$SOLUTION_INPUT" in
            all) solutions='["istio"]' ;;
            *)   solutions="[\"$SOLUTION_INPUT\"]" ;;
          esac
          case "$SUBSTRATE_INPUT" in
            all) substrates='["microk8s","canonical-k8s"]' ;;
            *)   substrates="[\"$SUBSTRATE_INPUT\"]" ;;
          esac
          echo "solutions=$solutions" >> "$GITHUB_OUTPUT"
          echo "substrates=$substrates" >> "$GITHUB_OUTPUT"

  istio:
    name: Istio
    needs: dispatch-inputs
    if: contains(fromJSON(needs.dispatch-inputs.outputs.solutions), 'istio')
    uses: ./.github/workflows/_istio-solution-tests.yaml
    with:
      istio-channel: "dev/edge"
      substrates: ${{ needs.dispatch-inputs.outputs.substrates }}
