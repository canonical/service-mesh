name: Release Charm to Edge and Publish Libraries

on:
  workflow_dispatch:
    inputs:
      charm:
        type: choice
        description: Which charm to release
        options:
          - all
          - envoy-controller-k8s
          - istio-beacon-k8s
          - istio-ingress-k8s
          - istio-k8s
  push:
    branches:
      - main
      - 'track/**'
    paths:
      - 'charms/**'

jobs:
  set-charms:
    name: Set charm matrix
    runs-on: ubuntu-latest
    outputs:
      charms: ${{ steps.set-charms.outputs.charms }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: charms
          sparse-checkout-cone-mode: true
      - uses: dorny/paths-filter@v3
        id: changes
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            envoy-ai-controller-k8s: charms/envoy-ai-controller-k8s/**
            envoy-controller-k8s: charms/envoy-controller-k8s/**
            envoy-ingress-k8s: charms/envoy-ingress-k8s/**
            istio-beacon-k8s: charms/istio-beacon-k8s/**
            istio-ingress-k8s: charms/istio-ingress-k8s/**
            istio-k8s: charms/istio-k8s/**
      - name: Set charms matrix
        id: set-charms
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.charm }}" != "all" ]]; then
            # Manual dispatch of a single charm: release only that charm.
            echo 'charms=[{"charm-path": "charms/${{ inputs.charm }}", "charm-name": "${{ inputs.charm }}"}]' >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual dispatch of 'all': release every charm.
            echo "charms=$(ls -d1 charms/* | jq -Rsc '[split("\n")[:-1][] | {("charm-path"): ., ("charm-name"): ltrimstr("charms/")}]')" >> "$GITHUB_OUTPUT"
          else
            # Push: release only the charms that changed.
            echo "charms=$(echo '${{ steps.changes.outputs.changes }}' | jq -c '[.[] | {("charm-path"): ("charms/" + .), ("charm-name"): .}]')" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Release (${{ matrix.charm-path }})
    needs: set-charms
    if: ${{ needs.set-charms.outputs.charms != '' && needs.set-charms.outputs.charms != '[]' }}
    strategy:
      matrix:
        include: ${{ fromJSON(needs.set-charms.outputs.charms) }}
      fail-fast: false
    permissions:
      actions: read
      security-events: write
      contents: write
    uses: canonical/observability/.github/workflows/charm-release.yaml@v2
    secrets: inherit
    with:
      charm-path: ${{ matrix.charm-path }}
      git-tag-prefix: ${{ matrix.charm-name }}
      default-track: dev
      provider: microk8s
