name: Promote Charm

on:
  workflow_dispatch:
    inputs:
      promotion:
        type: choice
        description: Channel to promote from
        options:
          - edge -> beta
          - beta -> candidate
          - candidate -> stable
      charm:
        type: choice
        description: Charm to promote
        options:
          - istio-k8s
          - istio-beacon-k8s
          - istio-ingress-k8s

jobs:
  promote:
    name: Promote
    uses: canonical/observability/.github/workflows/charm-promote.yaml@v2
    with:
      promotion: ${{ github.event.inputs.promotion }}
      charm-path: charms/${{ github.event.inputs.charm }}
    secrets: inherit
