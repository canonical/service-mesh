name: envoy-ai-controller-k8s
type: charm
title: Envoy AI Gateway Controller
summary: A Juju charm to deploy and operate the Envoy AI Gateway control plane
description: |
  envoy-ai-controller-k8s deploys and manages the Envoy AI Gateway controller
  in its own pod. It owns the aigateway.envoyproxy.io CRDs and the ExtProc
  sidecar-injector webhook, and serves the Envoy Gateway Extension Server
  protocol (gRPC) so an Envoy Gateway control plane can delegate AI-specific
  xDS fine-tuning to it over the envoy-extension-server relation.

links:
  source: https://github.com/canonical/service-mesh
  issues: https://github.com/canonical/service-mesh/issues

assumes:
  - k8s-api
  - juju >= 3.6

platforms:
  ubuntu@26.04:amd64:

containers:
  ai-gateway:
    resource: ai-gateway-image

charm-libs:
  - lib: grafana_k8s.grafana_dashboard
    version: "0"
  - lib: prometheus_k8s.prometheus_scrape
    version: "0"

config:
  options:
    log-level:
      type: string
      default: "info"
      description: |
        Logging level for the Envoy AI Gateway controller.
        Valid values: debug, info, warn, error. Any other value logs a warning and
        falls back to the default rather than being passed to the controller.
    extproc-image:
      type: string
      default: ""
      description: |
        OCI image reference for the ExtProc sidecar the controller injects into
        Envoy Gateway data-plane pods. Empty derives the reference from the
        ai-gateway-image resource tag against docker.io/envoyproxy/ai-gateway-extproc.
    metrics-request-header-attributes:
      type: string
      default: "x-user-id:user.id"
      description: |
        Comma-separated header:attribute pairs mapped onto GenAI metrics as
        metric attributes (e.g. "x-user-id:user.id"). An invalid value logs a
        warning and falls back to the default. Empty disables header mapping.

provides:
  grafana-dashboard:
    interface: grafana_dashboard
    optional: true
  metrics-endpoint:
    interface: prometheus_scrape
    optional: true
    description: |
      Prometheus scrape target for the controller's :8080/metrics endpoint.
      Needed alongside otlp because the controller doesn't OTLP-export its
      controller-runtime metrics.
  envoy-extension-server:
    interface: envoy_extension_server
    description: |
      Advertises this controller's Extension Server gRPC endpoint to an Envoy
      Gateway control plane. Relating enables AI Gateway features; the relation
      is the AI on/off switch.

requires:
  otlp:
    interface: otlp
    optional: true
    limit: 1
    description: |
      OTLP endpoint the injected ExtProc sidecars push GenAI metrics to.
      Publishes alert/recording rules into the relation databag.
  certificates:
    interface: tls-certificates
    # Mandatory: the ExtProc admission webhook cannot serve without a TLS cert, so the
    # charm blocks until this relation is established.
    optional: false
    limit: 1
    description: |
      TLS serving cert for the ExtProc admission webhook. The API server dials
      the webhook Service over TLS, so the served cert's SANs must cover that
      name and the issuing CA is reused as the webhook caBundle.

resources:
  ai-gateway-image:
    type: oci-image
    description: Envoy AI Gateway controller OCI image
    upstream-source: docker.io/envoyproxy/ai-gateway-controller:v0.6.0

parts:
  charm:
    source: .
    plugin: uv
    build-snaps: [astral-uv]
    build-packages: [git]
