name: envoy-ai-controller-k8s
type: charm
title: Envoy AI Gateway Controller
summary: A Juju charm to deploy and operate the Envoy AI Gateway control plane
description: |
  envoy-ai-controller-k8s deploys and manages the Envoy AI Gateway controller
  in its own pod. It owns the aigateway.envoyproxy.io CRDs and the ExtProc
  sidecar-injector webhook, and serves the Envoy Gateway Extension Server
  protocol (gRPC) so an Envoy Gateway control plane can delegate AI-specific
  xDS fine-tuning to it over the envoy-extension-server relation.

links:
  documentation: https://discourse.charmhub.io/t/envoy-ai-controller-k8s-docs-index
  website: https://charmhub.io/envoy-ai-controller-k8s
  source: https://github.com/canonical/envoy-ai-controller-k8s-operator
  issues: https://github.com/canonical/envoy-ai-controller-k8s-operator/issues

assumes:
  - k8s-api
  - juju >= 3.6

platforms:
  ubuntu@24.04:amd64:

containers:
  ai-gateway:
    resource: ai-gateway-image

config:
  options:
    log-level:
      type: string
      default: "info"
      description: |
        Logging level for the Envoy AI Gateway controller.
        Valid values: debug, info, warn, error.

provides:
  envoy-extension-server:
    interface: envoy_extension_server
    description: |
      Advertises this controller's Extension Server gRPC endpoint to an Envoy
      Gateway control plane. Relating enables AI Gateway features; the relation
      is the AI on/off switch.

requires:
  certificates:
    interface: tls-certificates
    optional: false
    limit: 1
    description: |
      TLS serving cert for the ExtProc admission webhook. The API server dials
      the webhook Service over TLS, so the served cert's SANs must cover that
      name and the issuing CA is reused as the webhook caBundle.

resources:
  ai-gateway-image:
    type: oci-image
    description: Envoy AI Gateway controller OCI image
    upstream-source: docker.io/envoyproxy/ai-gateway-controller:v0.6.0

parts:
  charm:
    source: .
    plugin: uv
    build-snaps: [astral-uv]
    build-packages: [git]
